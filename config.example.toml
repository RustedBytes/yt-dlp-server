[server]
bind_addr = "127.0.0.1:3000"
data_dir = "data"

# Empty by default, which disables CORS response headers.
# Example: ["http://localhost:5173"]
cors_allowed_origins = []

# Empty by default, which disables API key authentication.
# When set, send `x-api-key: <key>`, `Authorization: Bearer <key>`, or
# browser-friendly Basic auth with any username and the API key as the password.
api_keys = []

# Disabled by default. When greater than 0, applies per-key limits when API keys are configured.
rate_limit_requests_per_minute = 0

[queue]
queue_size = 128
body_limit_bytes = 131072

# Set to 0 to disable whole-request timeout enforcement.
request_timeout_seconds = 60

[download]
workers = 1
output_dir = "data/downloads"
yt_dlp_command = "uv"
cookies_path = ""
cookie_profiles.account_a = ""
format = ""
proxy = ""

# Platform IDs accepted by URL validation. Empty disables all platforms.
# Supported values: tiktok, instagram, youtube, facebook, snapchat, rutube, douyin, likee, vk, yappy.
enabled_platforms = [
  "tiktok",
  "instagram",
  "youtube",
  "facebook",
  "snapchat",
  "rutube",
  "douyin",
  "likee",
  "vk",
  "yappy",
]

max_urls_per_request = 100

# Set to 0 to disable per-job timeout enforcement.
job_timeout_seconds = 1800

# Maximum yt-dlp attempts per job, including the first attempt.
download_max_attempts = 3

# Initial retry backoff in milliseconds. Later retries double this delay.
download_initial_backoff_ms = 1000

# Set to 0 to disable automatic storage cleanup.
max_download_storage_bytes = 0

# Set to 0 to disable the free-space preflight check.
min_free_disk_bytes = 0

# Optional per-platform overrides. Any omitted field falls back to [download].
# Per-request API `format` still overrides both platform and global format.
[download.platforms.instagram]
cookies_path = ""
format = ""
proxy = ""
job_timeout_seconds = 1800
download_max_attempts = 3
download_initial_backoff_ms = 1000
max_concurrent = 1

[post_processing]
# Runs after yt-dlp succeeds and before object-storage upload.
enabled = false
fail_job_on_error = true

# Commands are executed directly with argv arrays, not through a shell.
# Supported placeholders: {job_id}, {job_dir}, {media_path}, {info_json_path}.
#[[post_processing.commands]]
#program = "ffmpeg"
#args = ["-y", "-i", "{media_path}", "-map_metadata", "-1", "{job_dir}/{job_id}.processed.mp4"]
#timeout_seconds = 600

[storage]
# local keeps artifacts only on the server filesystem. s3 uploads completed media and info JSON
# to an S3-compatible service such as S3, R2, or MinIO after post-processing.
backend = "local"
endpoint_url = ""
bucket = ""
region = "us-east-1"
access_key_id = ""
secret_access_key = ""
session_token = ""
prefix = ""
force_path_style = true
public_base_url = ""

[retention]
# Limits how many jobs stay queryable in memory. Set to 0 to retain none.
job_retention_limit = 1000

# Limits how many latest metadata records are kept when JSONL files are compacted at startup.
# Set to 0 to disable metadata compaction.
metadata_retention_limit = 10000

[webhooks]
# Set either value to 0 to disable that webhook timeout.
webhook_timeout_seconds = 10
webhook_connect_timeout_seconds = 5

# Webhooks retry failed deliveries with exponential backoff.
webhook_max_attempts = 1
webhook_initial_backoff_ms = 500

# Empty by default, which disables webhook HMAC signatures.
# When set, webhooks include `x-download-signature: sha256=<hex-hmac>`.
webhook_signing_secret = ""

# Keep false unless this service runs in a trusted network and must call private webhook targets.
allow_private_webhook_urls = false

[logging]
rust_log = "info"
