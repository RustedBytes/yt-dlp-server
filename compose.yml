services:
  downloader:
    build:
      context: .
      dockerfile: Containerfile
    image: yt-dlp-server:local
    ports:
      - "3000:3000"
    environment:
      BIND_ADDR: 0.0.0.0:3000
      DATA_DIR: /app/data
      DOWNLOAD_OUTPUT_DIR: /app/data/downloads
      RUST_LOG: info
    volumes:
      - downloader-data:/app/data
    restart: unless-stopped

volumes:
  downloader-data:
